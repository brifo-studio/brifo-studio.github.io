<link rel="stylesheet" href="base.css">
<style>
  .sec{height:1110px;background:radial-gradient(900px 600px at 0% 100%,#EEF0FF,transparent 60%),var(--bg);display:flex}
  .txt{width:450px;flex-shrink:0;padding:100px 0 0 96px}
  .txt h1{font-size:46px;margin:14px 0 20px}
  .txt p{font-size:17px;color:var(--text-muted);line-height:1.6;max-width:340px}
  .pillrow{margin-top:40px;display:flex;flex-direction:column;gap:10px}
  .pillrow span{font-size:14px;color:var(--text-body);font-weight:600;display:flex;align-items:center;gap:10px}
  .pillrow i{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .imgwrap{flex:1;padding:64px 0 0 0;position:relative}
  .crop{width:1150px;height:1043px;overflow:hidden;border-radius:var(--r) 0 0 var(--r);box-shadow:var(--sh-lg);border:1px solid var(--border);border-right:none}
  .crop img{width:1150px;display:block}
</style>
<div class="sec">
  <div class="txt">
    <div class="eyebrow">Интерфейс · 02</div>
    <h1 class="h">9 типов задач</h1>
    <p>Единая точка постановки — форма подсказывает, что заполнить, в зависимости от выбранного типа.</p>
    <div class="pillrow">
      <span><i></i>Видео</span>
      <span><i></i>Соцсети</span>
      <span><i></i>Презентация</span>
      <span><i></i>Лендинг</span>
      <span><i></i>Наружная реклама</span>
      <span><i></i>Полиграфия</span>
      <span><i></i>Фирм. стиль</span>
      <span><i></i>Правки</span>
      <span><i></i>Рекл. кампания</span>
    </div>
  </div>
  <div class="imgwrap">
    <div class="crop"><img src="../shots/types-campaign.png"></div>
  </div>
</div>
