<link rel="stylesheet" href="base.css">
<style>
  .sec{height:1040px;background:radial-gradient(1200px 800px at 50% 40%,#1E1533,#0B0B12 70%);padding:96px;position:relative;overflow:hidden;display:flex;align-items:center}
  .glow1{position:absolute;width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(124,55,217,.35),transparent 70%);top:10%;left:-10%;filter:blur(10px)}
  .glow2{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(91,76,245,.25),transparent 70%);bottom:-15%;right:5%;filter:blur(10px)}
  .head{position:absolute;top:96px;left:96px;z-index:3;max-width:640px}
  .head p{color:rgba(255,255,255,.55);font-size:17px;margin-top:14px;line-height:1.6;max-width:520px}
  .stage{position:relative;z-index:2;width:100%;display:flex;align-items:center;justify-content:center;gap:140px;margin-top:40px}
  .icon-tile{width:260px;height:260px;border-radius:64px;background:linear-gradient(150deg,#BA74FB,#6946F6 55%,#4338CA);position:relative;box-shadow:0 60px 100px rgba(105,70,246,.5),0 0 0 1px rgba(255,255,255,.06) inset;flex-shrink:0}
  .icon-tile::before{content:'';position:absolute;inset:0;border-radius:64px;background:radial-gradient(circle at 30% 22%,rgba(255,255,255,.55),transparent 45%);mix-blend-mode:overlay}
  .icon-tile svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);width:140px;height:auto}
  .sizes{display:flex;align-items:center;gap:28px}
  .sizes .sm{border-radius:22px;background:linear-gradient(150deg,#BA74FB,#6946F6 55%,#4338CA);box-shadow:0 20px 40px rgba(105,70,246,.4)}
  .sizes .sm svg{display:block}
  .phone-mini{width:220px;height:460px;border-radius:38px;background:#0d0d14;padding:8px;box-shadow:0 40px 80px rgba(0,0,0,.55);flex-shrink:0;position:relative}
  .phone-mini .screen{width:100%;height:100%;border-radius:30px;background:linear-gradient(160deg,#BA74FB,#6946F6 60%,#4338CA);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .phone-mini .screen svg{width:64px}
  .phone-mini .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:86px;height:18px;background:#0d0d14;border-radius:0 0 11px 11px;z-index:5}
</style>
<div class="sec">
  <div class="glow1"></div><div class="glow2"></div>
  <div class="head">
    <div class="eyebrow on-dark">Айдентика · App icon</div>
    <h1 class="h on-dark" style="margin-top:14px;font-size:42px">Тот же знак, доведённый до размера иконки</h1>
    <p>Фирменный «b» не меняется от носителя к носителю — только контейнер вокруг него. На иконке это скруглённый квадрат, фирменный градиент и мягкий внутренний блик.</p>
