<link rel="stylesheet" href="base.css">
<style>
  body{background:var(--ink-dark)}
  .sec{height:900px;background:
    radial-gradient(900px 500px at 78% 8%, rgba(124,55,217,.35), transparent 60%),
    radial-gradient(700px 500px at 15% 95%, rgba(91,76,245,.20), transparent 60%),
    linear-gradient(180deg,#0B0B12,#0D0B1A 60%,#0B0B12)}
  .ghost{position:absolute;top:-60px;right:-180px;width:1150px;transform:rotate(-7deg);opacity:.16;filter:saturate(0) brightness(1.6)}
  .ghost img{width:100%;display:block;border-radius:22px}
  .fade{position:absolute;inset:0;background:linear-gradient(100deg,#0B0B12 18%,transparent 46%,transparent 62%,#0B0B12 92%)}
  .content{position:relative;z-index:2;padding:96px 0 0 96px;max-width:900px}
  .logo{height:34px;margin-bottom:64px;display:block}
  .word{font-size:168px;font-weight:900;letter-spacing:-.04em;line-height:.85;color:#fff;margin:22px 0 30px}
  .one-liner{font-size:23px;line-height:1.5;color:rgba(255,255,255,.66);max-width:620px;font-weight:500}
  .tags{margin-top:56px;display:flex;gap:28px}
  .tags span{font-size:13px;color:rgba(255,255,255,.64);font-weight:600;letter-spacing:.03em}
  .tags b{color:rgba(255,255,255,.7)}
</style>
<div class="sec">
  <div class="ghost"><img src="../shots/kanban-designer.png"></div>
  <div class="fade"></div>
  <div class="content">
    <img class="logo" src="../../brifo/brifo white.svg">
    <div class="eyebrow on-dark">Product Design Case Study</div>
    <div class="word">brifo</div>
    <div class="one-liner">Платформа, где бриф превращается в результат — без потерянных задач и брифов на словах.</div>
    <div class="tags">
      <span><b>UX/UI</b></span>
      <span><b>Дизайн-система</b></span>
      <span><b>Логика продукта</b></span>
    </div>
  </div>
</div>
