<link rel="stylesheet" href="base.css">
<style>
  .sec{height:1000px;background:linear-gradient(135deg,#EDEBFF,#F6F3FF 55%,#EDEBFF);display:flex;align-items:center}
  .txt{width:560px;flex-shrink:0;padding-left:96px}
  .txt h1{font-size:44px;margin:14px 0 18px}
  .txt p{font-size:17px;color:var(--text-muted);line-height:1.6;max-width:400px}
  .stats{margin-top:36px;display:flex;gap:36px}
  .stats div b{display:block;font-size:30px;font-weight:900;color:var(--accent-dark)}
  .stats div span{font-size:13px;color:var(--text-body)}
  .imgwrap{flex:1;display:flex;justify-content:center}
  .cropbox{width:474px;height:948px;overflow:hidden;border-radius:22px;box-shadow:var(--sh-lg);border:1px solid rgba(15,10,50,.08)}
  .cropbox img{width:1920px;margin-top:-108px;margin-left:-726px;display:block;max-width:none}
</style>
<div class="sec">
  <div class="txt">
    <div class="eyebrow">Интерфейс · 06</div>
    <h1 class="h">Личность вместо галочки</h1>
    <p>12 аватаров, имя на доске и персональный цвет карточек — выбираются один раз при онбординге и потом узнаются с одного взгляда на канбане.</p>
    <div class="stats">
      <div><b>12</b><span>аватаров</span></div>
      <div><b>6</b><span>цветов карточек</span></div>
    </div>
  </div>
  <div class="imgwrap">
    <div class="cropbox"><img src="../shots/profile-modal.png"></div>
  </div>
</div>
